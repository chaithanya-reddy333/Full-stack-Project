{% extends 'admin/base.html' %}
{% block title %}{% if quiz %}Edit Quiz{% else %}Create Quiz{% endif %} – Admin{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{{ url_for('admin_quizzes') }}"
        style="color:var(--primary-light); text-decoration:none; font-size:0.88rem;">
        ← Back to Quizzes
    </a>
    <h1 class="section-title mt-2">
        {% if quiz %}✏️ Edit Quiz{% else %}➕ Create New Quiz{% endif %}
    </h1>
</div>

<div class="glass-card admin-card" style="max-width:580px;">
    <form method="POST"
        action="{% if quiz %}{{ url_for('admin_edit_quiz', quiz_id=quiz.id) }}{% else %}{{ url_for('admin_create_quiz') }}{% endif %}">

        <div class="form-group">
            <label class="form-label" for="quiz-title">Quiz Title *</label>
            <input type="text" class="form-control-custom" id="quiz-title" name="title"
                value="{{ quiz.title if quiz else '' }}" required placeholder="e.g. Python Fundamentals" />
        </div>

        <div class="form-group">
            <label class="form-label" for="quiz-desc">Description</label>
            <textarea class="form-control-custom" id="quiz-desc" name="description" rows="3"
                placeholder="Brief description of the quiz topic...">{{ quiz.description if quiz else '' }}</textarea>
        </div>

        <div class="row" style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
                <label class="form-label" for="passing-score">Passing Score (%)</label>
                <input type="number" class="form-control-custom" id="passing-score" name="passing_score" min="1"
                    max="100" value="{{ quiz.passing_score if quiz else 60 }}" required />
            </div>
            <div class="form-group">
                <label class="form-label" for="time-limit">Time Limit (seconds)</label>
                <input type="number" class="form-control-custom" id="time-limit" name="time_limit" min="0"
                    value="{{ quiz.time_limit if quiz else 600 }}" placeholder="0 = no limit" />
                <small style="color:var(--text-muted); font-size:0.78rem;">0 = no limit. 600 = 10 minutes.</small>
            </div>
        </div>

        <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn-primary-custom">
                {% if quiz %}💾 Save Changes{% else %}🚀 Create Quiz{% endif %}
            </button>
            <a href="{{ url_for('admin_quizzes') }}" class="btn-outline-custom">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
